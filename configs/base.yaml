target:
  id: isaaclab_go2
  project_root: /root/IsaacLab
  artifact_root: /root/auto-trainer-artifacts/isaaclab_go2
isaaclab:
  root_dir: /root/IsaacLab
  launcher: /root/IsaacLab/isaaclab.sh
  train_script: /root/IsaacLab/scripts/reinforcement_learning/rsl_rl/train.py
training:
  task: Isaac-Velocity-Flat-Unitree-Go2-v0
  headless: true
  num_envs: 256
  max_iterations: 50
  learning_rate: 0.001
  entropy_coef: 0.005
  clip_param: 0.2
  num_mini_batches: 4
trainer_override_mode: hydra
trainer_overrides: {}
command_override_mode: hydra
command:
  lin_vel_x:
  - 0.0
  - 1.0
  lin_vel_y:
  - -0.5
  - 0.5
  ang_vel_z:
  - -1.0
  - 1.0
  heading:
  - -3.141592653589793
  - 3.141592653589793
reward_override_mode: hydra
reward:
  track_lin_vel_xy_exp.weight: 1.5
  track_ang_vel_z_exp.weight: 0.75
  feet_air_time.weight: 0.25
  flat_orientation_l2.weight: -2.5
planner:
  goal: Improve training quality for Isaac-Velocity-Flat-Unitree-Go2-v0 by adjusting
    only allowed training configuration fields.
